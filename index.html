<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibleTracker</title>
  <meta name="description" content="Verfolge deinen Bibelleseplan und erreiche dein Zieldatum">
  <meta name="theme-color" content="#848923">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* — Brückengemeinde Brand Colors — */
      --primary:        #848923;  /* Mosgrün */
      --primary-light:  #9fa82d;
      --primary-dark:   #2C2C2D;  /* Anthrazit */
      --accent:         #EB5A3A;  /* Rotorange */
      --accent-light:   #F49A6B;  /* Pfirsich */
      --dunkelrot:      #791714;
      --petrol:         #80C8BE;
      --petrol-light:   #BFE1DE;
      --bg:             #E4DECD;  /* Beige */
      --bg-card:        #FFFFFF;
      --text:           #2C2C2D;  /* Anthrazit */
      --text-muted:     #7a756d;
      --border:         #D8D2C4;
      --at-color:       #848923;  /* Mosgrün für AT */
      --nt-color:       #80C8BE;  /* Petrol für NT */
      --radius:         12px;
      --shadow:         0 2px 12px rgba(44,44,45,0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #2C2C2D;
        --bg-card:    #3a3a3b;
        --text:       #E4DECD;
        --text-muted: #9a9588;
        --border:     #4a4a4b;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Serif', Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Bricolage Grotesque for display / headline elements */
    .app-title, .ring-pct, .hero-card-value, .modal-title,
    .section-title, .milestone-pct, .hdr-btn, .btn-xs,
    .btn-year-quick, .btn-confirm, .goal-set-btn, .book-name,
    .book-stat, .sub-ring-center, .stat-value, .hero-card-label,
    .ring-lbl, .ring-ch, .sub-ring-name, .sub-ring-sub,
    .section-badge, .bar-lbl, .ch-btn, .btn-xs {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      background: var(--primary);
      color: white;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-title {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      flex: 1;
    }
    .app-title span { color: rgba(255,255,255,0.65); font-weight: 400; }

    .hdr-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .hdr-btn-ghost {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .hdr-btn-ghost:hover { background: rgba(255,255,255,0.22); }

    .hdr-btn-accent {
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .hdr-btn-accent:hover { background: rgba(255,255,255,0.28); }

    /* ── HERO DASHBOARD ─────────────────────────────────────── */
    .hero {
      min-height: calc(100vh - 56px);
      background: linear-gradient(155deg, #2C2C2D 0%, #383838 60%, #1e1e1e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 32px;
      position: relative;
      overflow: hidden;
      gap: 32px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 10% 90%, rgba(235,90,58,0.11) 0%, transparent 50%),
        radial-gradient(ellipse at 88% 12%, rgba(128,200,190,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    /* Bildmarke (Brückengemeinde two-ring mark) as angeschnittene Deko */
    .bildmarke-deco {
      position: absolute;
      bottom: -80px;
      right: -90px;
      width: 340px;
      height: 425px;
      opacity: 0.055;
      pointer-events: none;
      z-index: 0;
    }
    .bildmarke-deco svg {
      width: 100%; height: 100%;
    }
    .bildmarke-deco path {
      stroke: #80C8BE;
      stroke-width: 20;
    }

    /* ── MAIN RING ──────────────────────────────────────────── */
    .hero-ring-wrap {
      position: relative;
      width: 230px;
      height: 230px;
      flex-shrink: 0;
    }
    .ring-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 24px rgba(235,90,58,0.3));
    }
    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 13;
    }
    .ring-fill-total {
      fill: none;
      stroke: var(--accent);
      stroke-width: 13;
      stroke-linecap: round;
      transition: stroke-dasharray 0.9s cubic-bezier(.4,0,.2,1);
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .ring-pct {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--accent-light);
      line-height: 1;
      letter-spacing: -2px;
    }
    .ring-lbl {
      font-size: 0.64rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 5px;
    }
    .ring-ch {
      font-size: 0.67rem;
      color: rgba(255,255,255,0.28);
      margin-top: 3px;
    }

    /* ── SUB RINGS ──────────────────────────────────────────── */
    .sub-rings { display: flex; gap: 48px; align-items: flex-start; }
    .sub-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .ring-wrap-inner {
      position: relative;
      width: 100px;
      height: 100px;
    }
    .sub-ring-svg { width: 100%; height: 100%; }
    .sub-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 9;
    }
    .sub-ring-fill {
      fill: none;
      stroke-width: 9;
      stroke-linecap: round;
      transition: stroke-dasharray 0.9s cubic-bezier(.4,0,.2,1);
    }
    .sub-ring-at { stroke: var(--at-color); }
    .sub-ring-nt { stroke: var(--nt-color); }
    .sub-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 800;
      color: white;
    }
    .sub-ring-name {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: rgba(255,255,255,0.4);
    }
    .sub-ring-sub {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.24);
      margin-top: -3px;
    }

    /* ── HERO STAT CARDS ────────────────────────────────────── */
    .hero-cards { display: flex; gap: 10px; }
    .hero-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
      min-width: 96px;
      backdrop-filter: blur(4px);
    }
    .hero-card-value {
      font-size: 1.55rem;
      font-weight: 900;
      color: white;
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .hero-card-label {
      font-size: 0.59rem;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 5px;
    }

    /* ── MILESTONES ─────────────────────────────────────────── */
    .milestones { display: flex; gap: 18px; align-items: center; }
    .milestone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.22;
      filter: grayscale(1);
      transition: opacity 0.5s, filter 0.5s;
    }
    .milestone.unlocked { opacity: 1; filter: none; }
    .milestone.just-unlocked {
      animation: ms-pop 0.55s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes ms-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.45); }
      65%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    .milestone-icon { font-size: 2rem; line-height: 1; }
    .milestone-pct {
      font-size: 0.58rem;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
    }
    .milestone.unlocked .milestone-pct { color: var(--accent-light); }

    /* ── HERO GOAL ──────────────────────────────────────────── */
    .hero-goal {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.9;
    }
    .hero-goal .goal-link {
      color: var(--accent-light);
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .hero-goal .goal-highlight {
      color: white;
      font-weight: 700;
    }
    .goal-set-btn {
      background: none;
      border: 1.5px dashed var(--accent);
      color: var(--accent-light);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .goal-set-btn:hover { background: rgba(201,168,76,0.1); }

    /* ── SCROLL HINT ────────────────────────────────────────── */
    .scroll-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: rgba(255,255,255,0.22);
      font-size: 0.6rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      animation: sh-bounce 2.4s ease-in-out infinite;
      user-select: none;
      margin-top: 4px;
    }
    .scroll-hint:hover { color: rgba(255,255,255,0.55); }
    .scroll-hint-arrow { font-size: 1.25rem; line-height: 1; }
    @keyframes sh-bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }

    /* ── MAIN CONTENT ───────────────────────────────────────── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    /* ── SECTION HEADERS ────────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      margin-top: 28px;
    }
    .section-head:first-child { margin-top: 0; }

    /* Space before NT section */
    .main > section + section { margin-top: 48px; }

    .section-badge {
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .badge-at { background: var(--at-color); color: white; }
    .badge-nt { background: var(--nt-color); color: white; }

    .section-title { font-size: 1rem; font-weight: 700; }
    .section-meta { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); }

    /* ── BOOK CARDS ─────────────────────────────────────────── */
    .books-list { display: flex; flex-direction: column; gap: 6px; }

    .book-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .book-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .book-header:hover { background: rgba(30,77,43,0.04); }

    .book-name {
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .book-stat {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .book-mini-bar {
      width: 56px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .book-mini-fill {
      height: 100%;
      background: var(--primary-light);
      border-radius: 2px;
      transition: width 0.35s;
    }

    .book-done {
      font-size: 0.65rem;
      background: var(--at-color);
      color: white;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .book-arrow {
      color: var(--text-muted);
      font-size: 0.7rem;
      transition: transform 0.22s;
      flex-shrink: 0;
    }
    .book-card.open .book-arrow { transform: rotate(180deg); }

    /* ── CHAPTERS PANEL ─────────────────────────────────────── */
    .chapters-panel {
      display: none;
      padding: 2px 12px 12px;
      border-top: 1px solid var(--border);
    }
    .book-card.open .chapters-panel { display: block; }

    .ch-actions {
      display: flex;
      gap: 6px;
      padding: 8px 0 10px;
    }
    .btn-xs {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .btn-xs:hover { background: var(--border); color: var(--text); }

    .ch-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .ch-btn {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ch-btn:hover { border-color: var(--primary-light); transform: scale(1.08); }
    .ch-btn:active { transform: scale(0.95); }
    .ch-btn.read {
      background: var(--primary-light);
      border-color: var(--primary-light);
      color: white;
    }
    .ch-btn.read:hover { background: var(--primary); border-color: var(--primary); }

    /* ── MODAL ──────────────────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .modal-bg.hidden { display: none; }

    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .modal-icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 14px;
    }
    .modal-title {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .modal-desc {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .modal-body { display: flex; flex-direction: column; gap: 10px; }

    .date-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      cursor: pointer;
    }
    .date-input:focus { border-color: var(--primary-light); }

    .modal-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .modal-divider::before, .modal-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-year-quick {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn-year-quick:hover { background: var(--border); border-color: var(--primary-light); }

    .btn-confirm {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-confirm:hover { background: var(--primary-light); }

    /* ── TOAST ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #232323;
      color: white;
      padding: 9px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── RESET CONFIRM ──────────────────────────────────────── */
    .reset-link {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      margin-top: 4px;
    }
    .reset-link:hover { color: #e05454; }

    /* ── MOBILE LABEL (hidden on desktop) ──────────────────── */
    .hdr-btn-label { display: inline; }

    /* ════════════════════════════════════════════════════════
       RESPONSIVE — MOBILE FIRST OVERRIDES
    ════════════════════════════════════════════════════════ */

    /* ── Safe-area padding (iPhone notch / home bar) ───────── */
    header {
      padding-top: env(safe-area-inset-top);
    }
    body {
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (max-width: 480px) {
      /* Header: icon-only buttons to save space */
      .hdr-btn {
        padding: 7px 10px;
        font-size: 0.75rem;
      }
      .hdr-btn-label { display: none; }
      .app-title { font-size: 1.05rem; }

      /* Hero: compact on mobile */
      .hero { gap: 24px; padding: 28px 16px 24px; min-height: calc(100svh - 56px); }
      .hero-ring-wrap { width: 180px; height: 180px; }

      .bildmarke-deco { display: none; }
      .ring-pct { font-size: 2.3rem; }
      .ring-wrap-inner { width: 84px; height: 84px; }
      .sub-rings { gap: 28px; }
      .hero-cards { gap: 7px; }
      .hero-card { padding: 13px 14px; min-width: 78px; }
      .hero-card-value { font-size: 1.35rem; }
      .milestones { gap: 14px; }
      .milestone-icon { font-size: 1.75rem; }

      /* Section: hide long meta text */
      .section-meta { display: none; }

      /* Book header: larger touch target */
      .book-header {
        padding: 13px 12px;
        min-height: 52px;
      }
      .book-name { font-size: 0.92rem; }

      /* Hide mini-bar on very small screens to reduce clutter */
      .book-mini-bar { display: none; }

      /* Chapters: bigger touch targets */
      .ch-btn {
        width: 42px;
        height: 42px;
        font-size: 0.8rem;
        border-radius: 8px;
      }
      .ch-grid { gap: 6px; }

      /* Main padding */
      .main { padding: 14px 12px 80px; }
      .section-head { margin-top: 22px; }
    }

    /* ── Tablet / large phone ──────────────────────────────── */
    @media (min-width: 481px) and (max-width: 768px) {
      .ch-btn {
        width: 38px;
        height: 38px;
      }
      .section-meta { font-size: 0.7rem; }
    }

    /* ── Modal: bottom-sheet on mobile ─────────────────────── */
    @media (max-width: 540px) {
      .modal-bg {
        align-items: flex-end;
        padding: 0;
      }
      .modal {
        border-radius: 24px 24px 0 0;
        padding: 28px 20px calc(20px + env(safe-area-inset-bottom));
        max-width: 100%;
        width: 100%;
        animation: slide-up 0.3s cubic-bezier(.4,0,.2,1);
      }
      @keyframes slide-up {
        from { transform: translateY(60px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      .modal-title { font-size: 1.2rem; }
      .btn-year-quick, .btn-confirm { padding: 14px; font-size: 1rem; }
      .date-input { font-size: 1rem; padding: 13px 14px; }
    }

    /* ── No-hover touch devices: remove hover side effects ─── */
    @media (hover: none) {
      .ch-btn:hover { transform: none; border-color: var(--border); }
      .ch-btn.read:hover { background: var(--primary-light); border-color: var(--primary-light); }
      .book-header:hover { background: transparent; }
      /* Keep active state for tactile feedback */
      .ch-btn:active { transform: scale(0.93); background: rgba(45,122,69,0.12); border-color: var(--primary-light); }
      .ch-btn.read:active { background: var(--primary); }
    }
  </style>
</head>
<body>

  <!-- ── GOAL MODAL ─────────────────────────────────── -->
  <div class="modal-bg hidden" id="goalModal" role="dialog" aria-modal="true" aria-label="Zieldatum festlegen">
    <div class="modal">
      <div class="modal-icon">📖</div>
      <h2 class="modal-title">Willkommen!</h2>
      <p class="modal-desc">Bis wann möchtest du die Bibel durchlesen?<br>Wähle ein Datum oder nutze die Schnellauswahl.</p>

        <input type="date" class="date-input" id="goalDateInput" aria-label="Zieldatum">
        <div class="modal-divider">oder</div>

      <button class="hdr-btn hdr-btn-ghost" id="exportBtn" title="JSON exportieren">⬇ <span class="hdr-btn-label">Export</span></button>

  <!-- ── HERO DASHBOARD ───────────────────────────────────── -->

    <!-- Main progress ring -->

      <svg class="ring-svg" viewBox="0 0 200 200" aria-hidden="true">

      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="heroTotalPct">0%</span>
        <span class="ring-lbl">Gesamt</span>
        <span class="ring-ch" id="heroTotalCh">0 / 1189 Kap.</span>
      </div>
    </div>

    <!-- AT + NT sub-rings -->
    <div class="sub-rings">
      <div class="sub-ring-wrap">
        <div class="ring-wrap-inner">
          <svg class="sub-ring-svg" viewBox="0 0 88 88" aria-hidden="true">
            <circle class="sub-ring-bg" cx="44" cy="44" r="34"/>
            <circle class="sub-ring-fill sub-ring-at" id="ringAT" cx="44" cy="44" r="34"
                    stroke-dasharray="0 213.63" transform="rotate(-90 44 44)"/>
          </svg>
          <div class="sub-ring-center" id="heroATPct">0%</div>
        </div>
        <span class="sub-ring-name">Altes Test.</span>
        <span class="sub-ring-sub" id="heroATCh">0 / 929</span>
      </div>

        <span class="milestone-icon">🏆</span><span class="milestone-pct">75%</span>

        <path fill="none" stroke="currentColor" stroke-width="20"
              d="m200,327.5c-93.92265,0 -170,-69.81215 -170,-156c0,-86.18785 76.07735,-156 170,-156c93.92265,0 170,69.81215 170,156c0,86.18785 -76.07735,156 -170,156z"/>
        <path fill="none" stroke="currentColor" stroke-width="20"
              d="m30,329.5c0,-86.18785 76.07735,-156 170,-156c93.92265,0 170,69.81215 170,156c0,86.18785 -76.07735,156 -170,156l-168,0l-2,-156z"/>
      </svg>
    </div>

  </section>

  <!-- ── BOOK LIST ─────────────────────────────────── -->
  <main class="main" id="main"></main>

  <!-- hidden file input for import -->
  <input type="file" id="fileInput" accept=".json" style="display:none" aria-hidden="true">

  <script>
  'use strict';

  /* ═══════════════════════════════════════════════════
     DATA
  ═══════════════════════════════════════════════════ */
  const AT_BOOKS = [
    { name: '1. Mose',        chapters: 50 },
    { name: '2. Mose',        chapters: 40 },
    { name: '3. Mose',        chapters: 27 },
    { name: '4. Mose',        chapters: 36 },
    { name: '5. Mose',        chapters: 34 },
    { name: 'Josua',          chapters: 24 },
    { name: 'Richter',        chapters: 21 },
    { name: 'Ruth',           chapters:  4 },
    { name: '1. Samuel',      chapters: 31 },
    { name: '2. Samuel',      chapters: 24 },
    { name: '1. Könige',      chapters: 22 },
    { name: '2. Könige',      chapters: 25 },
    { name: '1. Chronik',     chapters: 29 },
    { name: '2. Chronik',     chapters: 36 },
    { name: 'Esra',           chapters: 10 },
    { name: 'Nehemia',        chapters: 13 },
    { name: 'Esther',         chapters: 10 },
    { name: 'Hiob',           chapters: 42 },
    { name: 'Psalmen',        chapters: 150 },
    { name: 'Sprüche',        chapters: 31 },
    { name: 'Prediger',       chapters: 12 },
    { name: 'Hohelied',       chapters:  8 },
    { name: 'Jesaja',         chapters: 66 },
    { name: 'Jeremia',        chapters: 52 },
    { name: 'Klagelieder',    chapters:  5 },
    { name: 'Hesekiel',       chapters: 48 },
    { name: 'Daniel',         chapters: 12 },
    { name: 'Hosea',          chapters: 14 },
    { name: 'Joel',           chapters:  4 },
    { name: 'Amos',           chapters:  9 },
    { name: 'Obadja',         chapters:  1 },
    { name: 'Jona',           chapters:  4 },
    { name: 'Micha',          chapters:  7 },
    { name: 'Nahum',          chapters:  3 },
    { name: 'Habakuk',        chapters:  3 },
    { name: 'Zefanja',        chapters:  3 },
    { name: 'Haggai',         chapters:  2 },
    { name: 'Sacharja',       chapters: 14 },
    { name: 'Maleachi',       chapters:  3 },
  ];

  const NT_BOOKS = [
    { name: 'Matthäus',           chapters: 28 },
    { name: 'Markus',             chapters: 16 },
    { name: 'Lukas',              chapters: 24 },
    { name: 'Johannes',           chapters: 21 },
    { name: 'Apostelgeschichte',  chapters: 28 },
    { name: 'Römer',              chapters: 16 },
    { name: '1. Korinther',       chapters: 16 },
    { name: '2. Korinther',       chapters: 13 },
    { name: 'Galater',            chapters:  6 },
    { name: 'Epheser',            chapters:  6 },
    { name: 'Philipper',          chapters:  4 },
    { name: 'Kolosser',           chapters:  4 },
    { name: '1. Thessalonicher',  chapters:  5 },
    { name: '2. Thessalonicher',  chapters:  3 },
    { name: '1. Timotheus',       chapters:  6 },
    { name: '2. Timotheus',       chapters:  4 },
    { name: 'Titus',              chapters:  3 },
    { name: 'Philemon',           chapters:  1 },
    { name: 'Hebräer',            chapters: 13 },
    { name: 'Jakobus',            chapters:  5 },
    { name: '1. Petrus',          chapters:  5 },
    { name: '2. Petrus',          chapters:  3 },
    { name: '1. Johannes',        chapters:  5 },
    { name: '2. Johannes',        chapters:  1 },
    { name: '3. Johannes',        chapters:  1 },
    { name: 'Judas',              chapters:  1 },
    { name: 'Offenbarung',        chapters: 22 },
  ];

  const AT_TOTAL    = AT_BOOKS.reduce((s, b) => s + b.chapters, 0); // 929
  const NT_TOTAL    = NT_BOOKS.reduce((s, b) => s + b.chapters, 0); // 260
  const GRAND_TOTAL = AT_TOTAL + NT_TOTAL;                           // 1189

  /* ═══════════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════════ */
  let readChapters = {}; // e.g. { "1. Mose_3": true }
  let goalDate     = null; // "YYYY-MM-DD"

  const LS_READ = 'bt_read';
  const LS_GOAL = 'bt_goal';

  function loadState() {
    try {
      const r = localStorage.getItem(LS_READ);
      if (r) readChapters = JSON.parse(r);
      const g = localStorage.getItem(LS_GOAL);
      if (g) goalDate = g;
    } catch (e) { /* ignore */ }
  }

  function saveState() {
    try {
      localStorage.setItem(LS_READ, JSON.stringify(readChapters));
      if (goalDate) localStorage.setItem(LS_GOAL, goalDate);
    } catch (e) { /* ignore */ }
  }

  function chKey(bookName, ch) { return bookName + '_' + ch; }
  function isRead(bookName, ch) { return !!readChapters[chKey(bookName, ch)]; }

  function setRead(bookName, ch, val) {
    const k = chKey(bookName, ch);
    if (val) readChapters[k] = true;
    else delete readChapters[k];
  }

  function countRead(books) {
    return books.reduce((total, book) => {
      for (let i = 1; i <= book.chapters; i++) {
        if (isRead(book.name, i)) total++;
      }
      return total;
    }, 0);
  }

  function countReadBook(book) {
    let n = 0;
    for (let i = 1; i <= book.chapters; i++) if (isRead(book.name, i)) n++;
    return n;
  }

  /* ═══════════════════════════════════════════════════
     STATS
  ═══════════════════════════════════════════════════ */
  const CIRC_MAIN = 2 * Math.PI * 80;  // ≈ 502.65
  const CIRC_SUB  = 2 * Math.PI * 34;  // ≈ 213.63
  const MS_LEVELS = [10, 25, 50, 75, 100];
  let prevUnlocked = new Set();

  function updateStats() {
    const atRead    = countRead(AT_BOOKS);
    const ntRead    = countRead(NT_BOOKS);
    const totalRead = atRead + ntRead;

    const atPct    = AT_TOTAL    > 0 ? Math.round(atRead    / AT_TOTAL    * 100) : 0;
    const ntPct    = NT_TOTAL    > 0 ? Math.round(ntRead    / NT_TOTAL    * 100) : 0;
    const totalPct = GRAND_TOTAL > 0 ? Math.round(totalRead / GRAND_TOTAL * 100) : 0;

    // Main ring
    document.getElementById('ringTotal').setAttribute('stroke-dasharray',
      `${(totalPct / 100 * CIRC_MAIN).toFixed(2)} ${CIRC_MAIN.toFixed(2)}`);
    document.getElementById('heroTotalPct').textContent = totalPct + '%';
    document.getElementById('heroTotalCh').textContent  = totalRead + ' / ' + GRAND_TOTAL + ' Kap.';

    // AT sub-ring
    document.getElementById('ringAT').setAttribute('stroke-dasharray',
      `${(atPct / 100 * CIRC_SUB).toFixed(2)} ${CIRC_SUB.toFixed(2)}`);
    document.getElementById('heroATPct').textContent = atPct + '%';
    document.getElementById('heroATCh').textContent  = atRead + ' / ' + AT_TOTAL;

    // NT sub-ring
    document.getElementById('ringNT').setAttribute('stroke-dasharray',
      `${(ntPct / 100 * CIRC_SUB).toFixed(2)} ${CIRC_SUB.toFixed(2)}`);
    document.getElementById('heroNTPct').textContent = ntPct + '%';
    document.getElementById('heroNTCh').textContent  = ntRead + ' / ' + NT_TOTAL;

    // Stat cards
    document.getElementById('heroChRead').textContent = totalRead;

    // Milestone badges
    MS_LEVELS.forEach(m => {
      const el     = document.getElementById('ms' + m);
      const earned = totalPct >= m;
      el.classList.toggle('unlocked', earned);
      if (earned && !prevUnlocked.has(m)) {
        el.classList.remove('just-unlocked');
        void el.offsetWidth; // restart animation
        el.classList.add('just-unlocked');
        prevUnlocked.add(m);
      }
      if (!earned) prevUnlocked.delete(m);
    });

    // Goal section
    const goalEl = document.getElementById('heroGoal');

    if (!goalDate) {
      goalEl.innerHTML = '<button class="goal-set-btn" id="goalSetBtn">🎯 Zieldatum festlegen</button>';
      document.getElementById('goalSetBtn').addEventListener('click', openGoalModal);
      document.getElementById('heroDaysLeft').textContent = '–';
      document.getElementById('heroChPerDay').textContent  = '–';
      return;
    }

    const today     = new Date(); today.setHours(0, 0, 0, 0);
    const goal      = new Date(goalDate + 'T00:00:00');
    const daysLeft  = Math.ceil((goal - today) / 86400000);
    const remaining = GRAND_TOTAL - totalRead;
    const goalFmt   = goal.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

    document.getElementById('heroDaysLeft').textContent = daysLeft > 0 ? daysLeft : '0';

    if (totalRead >= GRAND_TOTAL) {
      goalEl.innerHTML = '🎉 <span class="goal-highlight">Ziel erreicht! Die gesamte Bibel gelesen.</span>';
      document.getElementById('heroChPerDay').textContent = '✓';
      return;
    }

    if (daysLeft <= 0) {
      document.getElementById('heroChPerDay').textContent = '–';
      goalEl.innerHTML =
        `Ziel war: <span class="goal-link" id="goalLinkEl">${goalFmt}</span><br>` +
        `<span style="color:#f87171;font-weight:700">Zieldatum überschritten!</span>`;
    } else {
      const chPerDay = (remaining / daysLeft).toFixed(1);
      document.getElementById('heroChPerDay').textContent = chPerDay;
      goalEl.innerHTML = `Ziel: <span class="goal-link" id="goalLinkEl">${goalFmt}</span>`;
    }

    const linkEl = document.getElementById('goalLinkEl');
    if (linkEl) linkEl.addEventListener('click', openGoalModal);
  }

  /* ═══════════════════════════════════════════════════
     BOOK CARD
  ═══════════════════════════════════════════════════ */
  function createBookCard(book) {
    const card = document.createElement('div');
    card.className = 'book-card';

    /* header */
    const hdr = document.createElement('div');
    hdr.className = 'book-header';
    hdr.setAttribute('role', 'button');
    hdr.setAttribute('tabindex', '0');
    hdr.setAttribute('aria-expanded', 'false');
    hdr.setAttribute('aria-label', book.name + ' aufklappen');

    const nameEl  = document.createElement('span'); nameEl.className  = 'book-name';
    const statEl  = document.createElement('span'); statEl.className  = 'book-stat';
    const miniBar = document.createElement('div');  miniBar.className = 'book-mini-bar';
    const miniFill = document.createElement('div'); miniFill.className = 'book-mini-fill';
    const arrow   = document.createElement('span'); arrow.className   = 'book-arrow'; arrow.textContent = '▼';

    miniBar.appendChild(miniFill);
    nameEl.textContent = book.name;

    hdr.appendChild(nameEl);
    hdr.appendChild(statEl);
    hdr.appendChild(miniBar);
    hdr.appendChild(arrow);

    /* chapters panel */
    const panel  = document.createElement('div'); panel.className = 'chapters-panel';
    const actions = document.createElement('div'); actions.className = 'ch-actions';
    const grid   = document.createElement('div'); grid.className = 'ch-grid';

    const allReadBtn = document.createElement('button'); allReadBtn.className = 'btn-xs'; allReadBtn.textContent = 'Alle ✓';
    const noneBtn    = document.createElement('button'); noneBtn.className    = 'btn-xs'; noneBtn.textContent    = 'Alle ✗';

    allReadBtn.addEventListener('click', () => { markAllBook(book, true, card, statEl, miniFill, grid); saveState(); updateStats(); });
    noneBtn.addEventListener('click',    () => { markAllBook(book, false, card, statEl, miniFill, grid); saveState(); updateStats(); });

    actions.appendChild(allReadBtn);
    actions.appendChild(noneBtn);
    panel.appendChild(actions);
    panel.appendChild(grid);
    card.appendChild(hdr);
    card.appendChild(panel);

    /* initial header state (no chapters rendered yet) */
    refreshBookHeader(book, statEl, miniFill, card);

    /* toggle */
    function doToggle() {
      const isOpen = card.classList.toggle('open');
      hdr.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      if (isOpen && grid.children.length === 0) {
        renderChapterGrid(book, grid, statEl, miniFill, card);
      }
    }
    hdr.addEventListener('click', doToggle);
    hdr.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doToggle(); } });

    return card;
  }

  function renderChapterGrid(book, grid, statEl, miniFill, card) {
    grid.innerHTML = '';
    for (let ch = 1; ch <= book.chapters; ch++) {
      const btn = document.createElement('button');
      btn.className = 'ch-btn' + (isRead(book.name, ch) ? ' read' : '');
      btn.textContent = ch;
      btn.title = book.name + ', Kapitel ' + ch;
      btn.setAttribute('aria-label', 'Kapitel ' + ch + (isRead(book.name, ch) ? ' (gelesen)' : ''));
      const thisCh = ch;
      btn.addEventListener('click', () => {
        const nowRead = !isRead(book.name, thisCh);
        setRead(book.name, thisCh, nowRead);
        btn.classList.toggle('read', nowRead);
        btn.setAttribute('aria-label', 'Kapitel ' + thisCh + (nowRead ? ' (gelesen)' : ''));
        saveState();
        refreshBookHeader(book, statEl, miniFill, card);
        updateStats();
      });
      grid.appendChild(btn);
    }
  }

  function refreshBookHeader(book, statEl, miniFill, card) {
    const n   = countReadBook(book);
    const pct = Math.round(n / book.chapters * 100);
    const done = n === book.chapters;

    statEl.textContent = n + '/' + book.chapters;
    miniFill.style.width = pct + '%';

    let doneBadge = card.querySelector('.book-done');
    if (done && !doneBadge) {
      doneBadge = document.createElement('span');
      doneBadge.className = 'book-done';
      doneBadge.textContent = '✓';
      card.querySelector('.book-arrow').before(doneBadge);
    } else if (!done && doneBadge) {
      doneBadge.remove();
    }
  }

  function markAllBook(book, val, card, statEl, miniFill, grid) {
    for (let i = 1; i <= book.chapters; i++) setRead(book.name, i, val);
    // Update grid buttons if rendered
    grid.querySelectorAll('.ch-btn').forEach((btn, idx) => {
      btn.classList.toggle('read', val);
      btn.setAttribute('aria-label', 'Kapitel ' + (idx + 1) + (val ? ' (gelesen)' : ''));
    });
    refreshBookHeader(book, statEl, miniFill, card);
  }

  /* ═══════════════════════════════════════════════════
     RENDER
  ═══════════════════════════════════════════════════ */
  function renderAll() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    main.appendChild(buildSection('AT', 'Altes Testament', AT_BOOKS, AT_TOTAL));
    main.appendChild(buildSection('NT', 'Neues Testament', NT_BOOKS, NT_TOTAL));
  }

  function buildSection(tag, title, books, total) {
    const section = document.createElement('section');

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML =
      `<span class="section-badge badge-${tag.toLowerCase()}">${tag}</span>` +
      `<span class="section-title">${title}</span>` +
      `<span class="section-meta">${books.length} Bücher &middot; ${total} Kapitel</span>`;

    const list = document.createElement('div');
    list.className = 'books-list';
    books.forEach(book => list.appendChild(createBookCard(book)));

    section.appendChild(head);
    section.appendChild(list);
    return section;
  }

  /* ═══════════════════════════════════════════════════
     GOAL MODAL
  ═══════════════════════════════════════════════════ */
  const goalModal = document.getElementById('goalModal');
  const goalInput = document.getElementById('goalDateInput');

  function openGoalModal() {
    const today = new Date().toISOString().split('T')[0];
    goalInput.min = today;
    goalInput.value = goalDate || '';
    document.getElementById('resetLink').style.display = goalDate ? 'block' : 'none';
    goalModal.classList.remove('hidden');
    goalInput.focus();
  }

  function closeGoalModal() {
    goalModal.classList.add('hidden');
  }

  document.getElementById('oneYearBtn').addEventListener('click', () => {
    const d = new Date();
    d.setFullYear(d.getFullYear() + 1);
    goalInput.value = d.toISOString().split('T')[0];
  });

  document.getElementById('confirmGoalBtn').addEventListener('click', () => {
    const val = goalInput.value;
    if (!val) { showToast('Bitte wähle ein Datum!'); return; }
    const sel   = new Date(val + 'T00:00:00');
    const today = new Date(); today.setHours(0, 0, 0, 0);
    if (sel <= today) { showToast('Das Datum muss in der Zukunft liegen!'); return; }
    goalDate = val;
    saveState();
    closeGoalModal();
    updateStats();
    showToast('Zieldatum gespeichert ✓');
  });

  document.getElementById('goalHeaderBtn').addEventListener('click', openGoalModal);

  // Close modal on overlay click only if goal already set (not first launch)
  goalModal.addEventListener('click', (e) => {
    if (e.target === goalModal && goalDate) closeGoalModal();
  });

  // Keyboard close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !goalModal.classList.contains('hidden') && goalDate) closeGoalModal();
  });

  // Reset all data
  document.getElementById('resetLink').addEventListener('click', () => {
    if (!confirm('Wirklich alle Daten zurücksetzen? Dies kann nicht rückgängig gemacht werden.')) return;
    readChapters = {};
    goalDate     = null;
    localStorage.removeItem(LS_READ);
    localStorage.removeItem(LS_GOAL);
    closeGoalModal();
    renderAll();
    updateStats();
    openGoalModal();
    showToast('Alle Daten zurückgesetzt');
  });

  /* ═══════════════════════════════════════════════════
     EXPORT / IMPORT
  ═══════════════════════════════════════════════════ */
  document.getElementById('exportBtn').addEventListener('click', () => {
    // Export read chapters as a plain array of keys for human readability.
    // E.g. ["1. Mose_1", "1. Mose_2", ...] — presence = read, absence = not read.
    const readArray = Object.keys(readChapters);
    const payload   = JSON.stringify({
      version:    2,
      exportDate: new Date().toISOString(),
      goal:       goalDate,
      read:       readArray,
    }, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'bibletracker_' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Exportiert ✓');
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (typeof data !== 'object' || data === null || !data.read) {
          throw new Error('Ungültig');
        }

        const newRead = {};
        if (Array.isArray(data.read)) {
          // v2 format: array of read chapter keys
          const validKey = /^.+_\d+$/;
          data.read.forEach((key) => {
            if (typeof key === 'string' && validKey.test(key)) newRead[key] = true;
          });
        } else if (typeof data.read === 'object') {
          // v1 format (legacy): { "Book_ch": true } — only accept truthy values
          const validKey = /^.+_\d+$/;
          Object.entries(data.read).forEach(([key, val]) => {
            if (typeof key === 'string' && validKey.test(key) && val) newRead[key] = true;
          });
        } else {
          throw new Error('Ungültig');
        }

        readChapters = newRead;
        if (data.goal && typeof data.goal === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(data.goal)) {
          goalDate = data.goal;
        }
        saveState();
        renderAll();
        updateStats();
        showToast('Importiert ✓');
      } catch (_) {
        showToast('Fehler: Ungültige Datei');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  /* ═══════════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════════ */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  /* ═══════════════════════════════════════════════════
     SERVICE WORKER
  ═══════════════════════════════════════════════════ */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  /* ═══════════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════════ */
  loadState();
  renderAll();
  updateStats();

  if (!goalDate) {
    openGoalModal();
  }
  </script>
</body>
</html>
