<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1e4d2b"/>

  <!-- Open book left page -->
  <path d="M256 148
           C 220 140, 160 148, 128 168
           L 128 364
           C 160 344, 220 336, 256 344
           Z"
        fill="#c9a84c" opacity="0.9"/>

  <!-- Open book right page -->
  <path d="M256 148
           C 292 140, 352 148, 384 168
           L 384 364
           C 352 344, 292 336, 256 344
           Z"
        fill="#e5c76a" opacity="0.95"/>

  <!-- Book spine -->
  <rect x="248" y="140" width="16" height="212" rx="8" fill="#8b6914"/>

  <!-- Left page lines -->
  <line x1="148" y1="206" x2="242" y2="200" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="148" y1="228" x2="242" y2="222" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="148" y1="250" x2="242" y2="246" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="148" y1="272" x2="242" y2="270" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Right page lines -->
  <line x1="270" y1="200" x2="364" y2="206" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="270" y1="222" x2="364" y2="228" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="270" y1="246" x2="364" y2="250" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="270" y1="270" x2="364" y2="272" stroke="#8b6914" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Checkmark on right page -->
  <polyline points="294,296 318,322 362,272" stroke="white" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
</svg>
